<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230b0b13'/%3E%3Ctext x='50%25' y='54%25' font-family='Verdana,sans-serif' font-size='42' font-weight='700' fill='%23FF7A1A' text-anchor='middle' dominant-baseline='middle'%3Ei%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PWA: app instalável -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0b13" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iPhone (Safari): app em tela cheia -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Instructiva" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Monitoria de Atendimento — Instructiva</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("instructiva_theme") || "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // registra o service worker (necessário pra "instalar" o app)
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
