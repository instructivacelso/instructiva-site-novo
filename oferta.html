<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Campanha Relâmpago — Escola Instructiva</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Manrope',sans-serif; color:#fff; min-height:100vh;
    background:#050505;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(249,115,22,.18), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,193,7,.12), transparent 42%);
    display:flex; align-items:center; justify-content:center; padding:32px 18px;
  }
  .flash{ position:fixed; opacity:.5; pointer-events:none; z-index:0; }
  .flash svg{ display:block; }
  .flash.r{ top:8%; right:2%; }
  .flash.l{ bottom:6%; left:1%; transform:scaleX(-1); }

  .card{
    position:relative; z-index:1; width:100%; max-width:560px;
    background:linear-gradient(180deg, rgba(20,20,20,.9), rgba(6,6,6,.95));
    border:1px solid rgba(249,115,22,.28); border-radius:22px;
    padding:38px 30px 34px; text-align:center;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.02) inset;
  }

  .logo-img{ height:52px; width:auto; margin:0 auto 20px; display:block; }

  .eyebrow{
    display:inline-flex; align-items:center; gap:9px;
    font-family:'Manrope',sans-serif; font-weight:800; font-size:16px; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:16px;
  }
  .eyebrow .bolt{ color:#FFC107; font-size:20px; }
  .eyebrow b{ color:#F97316; }

  h1{
    font-size:clamp(30px,6vw,44px); font-weight:800; line-height:1.02;
    text-transform:uppercase; letter-spacing:-.5px; margin-bottom:26px;
  }

  .tiers{ display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }
  .tier{
    display:flex; align-items:center; gap:16px; border-radius:16px;
    padding:18px 22px; text-align:left;
  }
  .tier .ic{ flex:0 0 auto; }
  .tier .lbl{ flex:1; }
  .tier .lbl .nm{ font-size:26px; font-weight:800; line-height:1; }
  .tier .lbl .sm{ font-size:13.5px; font-weight:600; opacity:.8; margin-top:3px; }
  .tier .off{ font-size:clamp(30px,7vw,46px); font-weight:800; line-height:1; white-space:nowrap; }

  /* PIX — destaque dourado */
  .tier.pix{ background:linear-gradient(180deg,#FFD54A,#F6A80B); color:#1a1200;
    box-shadow:0 0 34px -6px rgba(255,193,7,.55); }
  .tier.pix .lbl .nm{ font-size:34px; }
  .tier.pix .lbl .sm{ opacity:.75; font-weight:700; }
  .tier.pix .off{ color:#1a1200; }

  /* Cartão e Boleto — escuro com borda laranja */
  .tier.dark{ background:#0d0d0d; border:1.5px solid rgba(249,115,22,.55);
    box-shadow:0 0 22px -10px rgba(249,115,22,.5); }
  .tier.dark .lbl .nm{ color:#fff; }
  .tier.dark .lbl .sm{ color:#bdbdbd; }
  .tier.dark .off{ color:#F6A80B; }
  .tier .ic svg{ display:block; }

  .urgency{
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
    background:linear-gradient(90deg,#C1121F,#E23744); color:#fff;
    border-radius:100px; padding:12px 20px; font-weight:800; font-size:15px;
    letter-spacing:.3px; text-transform:uppercase; margin-bottom:8px;
  }
  .urgency .clock{ font-size:17px; }
  .countdown{ font-variant-numeric:tabular-nums; }

  .cta{
    display:flex; align-items:center; justify-content:center; gap:12px;
    width:100%; margin-top:22px; text-decoration:none;
    background:#25D366; color:#062b12; font-weight:800; font-size:20px;
    padding:20px 24px; border-radius:14px; letter-spacing:-.2px;
    box-shadow:0 16px 40px -12px rgba(37,211,102,.6);
    animation:pulse 1.8s ease-in-out infinite;
  }
  .cta:hover{ background:#1fbb59; transform:translateY(-1px); }
  .cta svg{ flex:0 0 auto; }
  @keyframes pulse{
    0%,100%{ box-shadow:0 16px 40px -12px rgba(37,211,102,.6); }
    50%{ box-shadow:0 16px 52px -8px rgba(37,211,102,.9); }
  }
  .cta-note{ margin-top:12px; font-size:13px; color:#9a9a9a; font-family:'Inter',sans-serif; }

  @media (max-width:480px){
    .card{ padding:28px 18px 26px; }
    .tier{ padding:15px 16px; gap:12px; }
    .tier .lbl .nm{ font-size:22px; }
    .tier.pix .lbl .nm{ font-size:27px; }
    .urgency{ font-size:13px; }
  }
</style>
</head>
<body>

<div class="flash r" aria-hidden="true">
  <svg width="90" height="180" viewBox="0 0 90 180"><path d="M55 0 L10 95 L45 95 L30 180 L85 70 L48 70 Z" fill="#FFC107"/></svg>
</div>
<div class="flash l" aria-hidden="true">
  <svg width="70" height="150" viewBox="0 0 90 180"><path d="M55 0 L10 95 L45 95 L30 180 L85 70 L48 70 Z" fill="#F97316"/></svg>
</div>

<main class="card">
  <img class="logo-img" src="assets/img/logo-instructiva.png" alt="Escola Instructiva"
       onerror="this.style.display='none';document.getElementById('logoTxt').style.display='block';">
  <div id="logoTxt" style="display:none;font-weight:800;font-size:24px;margin-bottom:20px;">Escola <span style="color:#F97316;">Instructiva</span></div>

  <div class="eyebrow"><span class="bolt">⚡</span> Campanha <b>Relâmpago</b></div>

  <h1>Escolha como pagar</h1>

  <div class="tiers">
    <div class="tier pix">
      <div class="ic">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M12 2l3 3-3 3-3-3 3-3zm0 14l3 3-3 3-3-3 3-3zM2 12l3-3 3 3-3 3-3-3zm14 0l3-3 3 3-3 3-3-3z" fill="#1a1200"/></svg>
      </div>
      <div class="lbl"><div class="nm">PIX</div><div class="sm">à vista</div></div>
      <div class="off">45% OFF</div>
    </div>

    <div class="tier dark">
      <div class="ic">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2.5" stroke="#39c0e8" stroke-width="1.8"/><path d="M2 9h20" stroke="#39c0e8" stroke-width="1.8"/><path d="M6 15h4" stroke="#39c0e8" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      <div class="lbl"><div class="nm">CARTÃO</div><div class="sm">12x sem juros</div></div>
      <div class="off">30% OFF</div>
    </div>

    <div class="tier dark">
      <div class="ic">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="6" width="19" height="12" rx="2" stroke="#39c0e8" stroke-width="1.8"/><path d="M12 9.5l.6 1.4 1.5.1-1.1 1 .4 1.5-1.4-.8-1.4.8.4-1.5-1.1-1 1.5-.1.6-1.4z" fill="#39c0e8"/></svg>
      </div>
      <div class="lbl"><div class="nm">BOLETO</div><div class="sm">12x sem juros</div></div>
      <div class="off">20% OFF</div>
    </div>
  </div>

  <div class="urgency">
    <span class="clock">🕐</span> Só hoje • Encerra às 22h • <span class="countdown" id="cd">--:--:--</span>
  </div>

  <a class="cta" href="https://wa.me/5544998500211?text=Ol%C3%A1%21%20Quero%20garantir%20a%20Campanha%20Rel%C3%A2mpago%20da%20Escola%20Instructiva%21" target="_blank" rel="noopener">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.48s1.07 2.88 1.22 3.08c.15.2 2.1 3.2 5.08 4.49.71.3 1.26.49 1.69.63.71.22 1.36.19 1.87.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35zM12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.06L2 22l5.06-1.35A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
    Chame um atendente agora!
  </a>
  <div class="cta-note">Atendimento imediato pelo WhatsApp • sem prorrogação</div>
</main>

<script>
  // contagem regressiva ate as 22h (horario do visitante)
  (function(){
    var el = document.getElementById('cd');
    function tick(){
      var now = new Date();
      var target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 22, 0, 0, 0);
      var diff = target - now;
      if(diff <= 0){ el.textContent = 'ENCERRADO'; return; }
      var h = Math.floor(diff/3600000);
      var m = Math.floor((diff%3600000)/60000);
      var s = Math.floor((diff%60000)/1000);
      function p(n){ return (n<10?'0':'')+n; }
      el.textContent = p(h)+':'+p(m)+':'+p(s);
    }
    tick(); setInterval(tick, 1000);
  })();
</script>
</body>
</html>
